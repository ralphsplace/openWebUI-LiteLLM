model_list:
  - model_name: fast-chat
    litellm_params:
      model: ollama_chat/mistral:latest
      api_base: http://192.168.53.30:11434

  - model_name: coder
    litellm_params:
      model: ollama_chat/deepseek-coder:latest
      api_base: http://192.168.53.30:11434

  - model_name: general
    litellm_params:
      model: ollama_chat/llama3:8b
      api_base: http://192.168.53.80:11434

  - model_name: large-general
    litellm_params:
      model: ollama_chat/glm-4.7-flash:latest
      api_base: http://192.168.53.80:11434

  - model_name: compact
    litellm_params:
      model: ollama_chat/gemma3:4b
      api_base: http://192.168.53.80:11434

search_tools:
  - search_tool_name: brave-search
    litellm_params:
      search_provider: brave
      api_key: os.environ/BRAVE_API_KEY

router_settings:
  routing_strategy: least-busy
  num_retries: 3
  timeout: 120

litellm_settings:
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
