services:
  redis:
    image: redis:7
    container_name: litellm_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - ai_stack
      
  open-terminal:
    image: ghcr.io/open-webui/open-terminal:slim
    container_name: open-terminal
    restart: unless-stopped
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"          
    environment:  
      OPEN_TERMINAL_API_KEY: ${OPEN_TERMINAL_API_KEY}
    volumes:
      - open_terminal:/home/user
      - ./open-terminal-config.toml:/etc/open-terminal/config.toml
    networks:
      - ai_stack
      
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"     
    environment:
      DATABASE_URL: postgresql://${LITELLM_POSTGRES_USER}:${LITELLM_POSTGRES_PASSWORD}@${LITELLM_POSTGRES_HOST}:5432/${LITELLM_POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
      STORE_MODEL_IN_DB: true
      OLLAMA_SRC1: ${OLLAMA_SRC1}
      OLLAMA_SRC2: ${OLLAMA_SRC2}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      LITELLM_LOG: DEBUG
      SSL_CERT_FILE: /usr/local/share/ca-certificates/local-ca.pem
      REQUESTS_CA_BUNDLE: /usr/local/share/ca-certificates/local-ca.pem      
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
      - ./certs/local-ca.pem:/usr/local/share/ca-certificates/local-ca.pem:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/readiness', timeout=5)\""]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - ai_stack
      
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "3000:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OPENAI_API_BASE_URL: http://litellm:4000/v1
      OPENAI_API_KEY: ${LITELLM_API_KEY}

      # --- AUTH / FEATURES ---
      WEBUI_AUTH: true
      ENABLE_OLLAMA_API: false
      ENABLE_OPENAI_API: true
      ENABLE_WEB_SEARCH: true

      # --- SEARCH ---
      WEB_SEARCH_ENGINE: brave
      WEB_SEARCH_API_KEY: ${BRAVE_API_KEY}

      # --- TERMINAL ---
      OPEN_TERMINAL_URL: http://open-terminal:8000
      OPEN_TERMINAL_API_KEY: ${OPEN_TERMINAL_API_KEY}

      # =========================
      # 🔥 ADD THIS BLOCK
      # =========================

      # PostgreSQL (host machine)
      DATABASE_URL: postgresql://${RAG_POSTGRES_USER}:${RAG_POSTGRES_PASSWORD}@${RAG_POSTGRES_HOST}:5432/${RAG_POSTGRES_DB}

      # Tell Open WebUI to use pgvector
      VECTOR_DB: pgvector

      # Optional: helps debugging RAG
      LOG_LEVEL: DEBUG

    volumes:
      - openwebui_data:/app/backend/data
    depends_on:
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - ai_stack
      
volumes:
  redis_data:
  openwebui_data:
  open_terminal:

networks:
  ai_stack:
    driver: bridge
